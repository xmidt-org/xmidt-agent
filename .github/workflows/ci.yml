---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: write
  packages: write

jobs:
  ci:
    # yamllint disable-line
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@216a9010316548a584f5ef6c2284bafa9e80296d # v4.9.43
    with:
      release-type:         program
      release-main-package: ./cmd/xmidt-agent
      release-custom-file:  true
      release-docker:       true
      yaml-lint-skip:       false
    secrets: inherit
