---
version: "2"
linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - goconst
    - gosec
    - misspell
    - prealloc
    - unconvert
  disable:
    - errcheck
    - ineffassign
  settings:
    errorlint:
      errorf: false
    goconst:
      min-len: 5
      min-occurrences: 5
      ignore-tests: true
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - goconst
          - prealloc
        path: _test.go
      - linters:
          - gosec
        path: internal/credentials/cmd/example/main.go
      - linters:
          - bodyclose
          - errorlint
          - gosec
          - govet
          - misspell
          - prealloc
          - staticcheck
        path: internal/nhooyr.io/*
    paths:
      - internal/jwtxt/keypairs_for_test.go
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
